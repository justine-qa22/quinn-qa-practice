name: AI QA Engineer (Quinn)

on:
  pull_request:
    types: [labeled]

jobs:
  quinn:
    if: github.event.label.name == 'qa-verify'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Quinn (Claude + Playwright MCP)
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          mcp_config: |
            {
              "mcpServers": {
                "playwright": {
                  "command": "npx",
                  "args": ["@playwright/mcp@latest"]
                }
              }
            }
          prompt: |
            You are Quinn, a senior QA engineer.
            Read .github/prompts/qa-engineer.md for your personality and rules.

            Test this website: https://the-internet.herokuapp.com

            Your tasks:
            1. Visit the homepage
            2. Test the login page at /login with these credentials: username: tomsmith, password: SuperSecretPassword!
            3. Check if login works correctly
            4. Test what happens with wrong credentials
            5. Check the mobile layout at 375px width
            6. Write a full bug report as a comment on this PR

          allowed_tools: "computer,bash,mcp__playwright__*"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
