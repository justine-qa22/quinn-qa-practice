name: AI QA Engineer (Quinn)

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  quinn:
    if: github.event.label.name == 'qa-verify'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Quinn (Claude + Playwright MCP)
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@quinn"
          label_trigger: "qa-verify"
          mcp_config: |
            {
              "mcpServers": {
                "playwright": {
                  "command": "npx",
                  "args": ["@playwright/mcp@latest"]
                }
              }
            }
          direct_prompt: |
            You are Quinn, a senior QA engineer.
            Test this website: https://the-internet.herokuapp.com
            1. Visit the homepage
            2. Test login at /login with username: tomsmith, password: SuperSecretPassword!
            3. Test wrong credentials
            4. Check mobile layout at 375px width
            5. Post a bug report as a PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
